name: Release

on:
  push:
    branches:
      - master
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v$(jq -r .version package.json)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $TAG"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
            cross: true
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            bun build --compile --minify --target=bun-${{ matrix.target }} src/index.ts --outfile supergraph
          else
            bun build --compile --minify src/index.ts --outfile supergraph
          fi

      - name: Package
        run: |
          tar czf supergraph-${{ matrix.target }}.tar.gz supergraph
          shasum -a 256 supergraph-${{ matrix.target }}.tar.gz > supergraph-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: supergraph-${{ matrix.target }}
          path: |
            supergraph-${{ matrix.target }}.tar.gz
            supergraph-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/supergraph-*.tar.gz
            artifacts/supergraph-*.sha256

      - name: Update Homebrew tap
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          SHA_DARWIN_ARM64=$(awk '{print $1}' artifacts/supergraph-darwin-arm64.tar.gz.sha256)
          SHA_DARWIN_X64=$(awk '{print $1}' artifacts/supergraph-darwin-x64.tar.gz.sha256)
          SHA_LINUX_X64=$(awk '{print $1}' artifacts/supergraph-linux-x64.tar.gz.sha256)

          git clone https://x-access-token:${{ github.token }}@github.com/bravenewxyz/homebrew-supergraph.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/supergraph.rb << FORMULA
          class Supergraph < Formula
            desc "Unified code analysis toolkit — semantic graphs, complexity, dead exports, contracts, and more"
            homepage "https://github.com/bravenewxyz/supergraph"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/bravenewxyz/supergraph/releases/download/v${VERSION}/supergraph-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end

              on_intel do
                url "https://github.com/bravenewxyz/supergraph/releases/download/v${VERSION}/supergraph-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/bravenewxyz/supergraph/releases/download/v${VERSION}/supergraph-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "supergraph"
            end

            test do
              assert_match "supergraph", shell_output("#{bin}/supergraph --help")
            end
          end
          FORMULA

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/supergraph.rb
          git commit -m "Update supergraph to v${VERSION}"
          git push
